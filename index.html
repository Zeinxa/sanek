<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo do Minhocão - GitHub</title>
  <style>
    body {
      background-color: #1a1a24;
      color: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      margin-bottom: 10px;
    }
    #score {
      font-size: 20px;
      margin-bottom: 15px;
    }
    canvas {
      border: 3px solid #4834d4;
      background-color: #0f0f17;
      box-shadow: 0px 0px 20px rgba(72, 52, 212, 0.4);
    }
  </style>
</head>
<body>

  <h1>labubu explosivo</h1>
  <div id="score">Pontuação: 0</div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameInterval;

    document.addEventListener("keydown", changeDirection);

    function gameLoop() {
      moveSnake();
      if (checkGameOver()) {
        alert("você morreu bobão haha! Sua pontuação foi: " + score);
        resetGame();
        return;
      }
      checkFoodCollision();
      drawGame();
    }

    function drawGame() {
      // Limpa a tela
      ctx.fillStyle = "#0f0f17";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Desenha a comida
      ctx.fillStyle = "#ff4757";
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

      // Desenha a cobra
      ctx.fillStyle = "#2ed573";
      snake.forEach(segment => {
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
      });
    }

    function moveSnake() {
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      snake.unshift(head);
      snake.pop();
    }

    function changeDirection(event) {
      const keyPressed = event.keyCode;
      const LEFT = 37, UP = 38, RIGHT = 39, DOWN = 40;

      const goingUp = dy === -1;
      const goingDown = dy === 1;
      const goingRight = dx === 1;
      const goingLeft = dx === -1;

      if (keyPressed === LEFT && !goingRight) { dx = -1; dy = 0; }
      if (keyPressed === UP && !goingDown) { dx = 0; dy = -1; }
      if (keyPressed === RIGHT && !goingLeft) { dx = 1; dy = 0; }
      if (keyPressed === DOWN && !goingUp) { dx = 0; dy = 1; }
    }

    function checkFoodCollision() {
      if (snake[0].x === food.x && snake[0].y === food.y) {
        score += 10;
        document.getElementById("score").innerText = "Pontuação: " + score;
        
        // Aumenta o tamanho da cobra
        snake.push({...snake[snake.length - 1]});

        // Gera nova comida
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      }
    }

    function checkGameOver() {
      const head = snake[0];

      // Bateu nas paredes
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        return true;
      }

      // Bateu no próprio corpo (apenas se estiver em movimento)
      if (dx !== 0 || dy !== 0) {
        for (let i = 1; i < snake.length; i++) {
          if (head.x === snake[i].x && head.y === snake[i].y) {
            return true;
          }
        }
      }

      return false;
    }

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      dx = 0;
      dy = 0;
      score = 0;
      document.getElementById("score").innerText = "Pontuação: " + score;
      food = { x: 15, y: 15 };
    }

    // Atualiza o jogo a cada 100ms
    setInterval(gameLoop, 100);
  </script>
</body>
</html>
